# Neon Sentinel — Sepolia testnet deployment config.
# Use with: sozo -P sepolia build / sozo -P sepolia migrate
# Env vars (e.g. from .env.sepolia): STARKNET_RPC_URL, DOJO_ACCOUNT_ADDRESS, DOJO_PRIVATE_KEY

[world]
name = "Neon Sentinel"
description = "Neon Sentinel — a Dojo Autonomous World."
cover_uri = "file://assets/cover.png"
icon_uri = "file://assets/icon.png"
website = "https://github.com/dojoengine/neon-sentinel-dojo"
# Use a unique seed per deployment. Max 31 chars (Starknet short string limit). Changed for fresh world (RankNFT schema not upgradeable).
seed = "neon_sentinel_sepolia_bal_v3"

[world.socials]
x = "https://x.com/ohayo_dojo"
discord = "https://discord.gg/FB2wR6uF"
github = "https://github.com/dojoengine/neon-sentinel-dojo"
telegram = "https://t.me/dojoengine"

[namespace]
default = "neon_sentinel"

[env]
# Supply via environment when running sozo (e.g. source .env.sepolia):
#   STARKNET_RPC_URL, DOJO_ACCOUNT_ADDRESS, DOJO_PRIVATE_KEY
# Leave empty here; the deploy script exports them from .env.sepolia.
# If your Sozo version requires values in file, set them here and do not commit.
rpc_url = ""         # or env: STARKNET_RPC_URL
account_address = "" # or env: DOJO_ACCOUNT_ADDRESS
private_key = ""     # or env: DOJO_PRIVATE_KEY
# Fresh deploy: set to "0". After first successful migrate, set this to the printed world address.
# Redeploy (upgrade): set to existing world address to upgrade that world.
world_address = "0x07bcbeb6104a77c6c90d7285ba06c2623454a38b501554c0d1645013fe610fc1"

[writers]
"neon_sentinel" = ["neon_sentinel-actions", "neon_sentinel-buy_coins", "neon_sentinel-claim_coins", "neon_sentinel-end_run", "neon_sentinel-init_game", "neon_sentinel-initialize_coin_shop", "neon_sentinel-pause_unpause_purchasing", "neon_sentinel-purchase_cosmetic", "neon_sentinel-purchase_mini_me_sessions", "neon_sentinel-purchase_mini_me_unit", "neon_sentinel-spend_coins", "neon_sentinel-spend_revive", "neon_sentinel-submit_leaderboard", "neon_sentinel-update_exchange_rate", "neon_sentinel-rank_nft_contract", "neon_sentinel-player_movement", "neon_sentinel-enemy_manager", "neon_sentinel-game_tick"]

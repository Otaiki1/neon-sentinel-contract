[package]
name = "neon_sentinel"
version = "1.8.0"
edition = "2024_07"

[cairo]
# false = deterministic class hashes for deployment (avoids "Mismatch compiled class hash" on migrate).
sierra-replace-ids = false

[scripts]
migrate = "sozo build && sozo migrate"
spawn = "sozo execute neon_sentinel-actions spawn --wait"
move = "sozo execute neon_sentinel-actions move -c 1 --wait"

[profile.sepolia]

[dependencies]
dojo = "1.8.0"
starknet = "2.13.1"

[[target.starknet-contract]]
build-external-contracts = ["dojo::world::world_contract::world"]

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros"]

[dev-dependencies]
cairo_test = "2.13.1"
dojo_cairo_test = "1.8.0"
